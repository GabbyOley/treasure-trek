name: Auto-merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false
    steps:
      - name: Approve
        run: |
          if gh pr review --approve "$PR_URL"; then
            echo "Approval submitted."
          else
            echo "Approval attempt failed; continuing without failing the workflow."
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable auto-merge
        run: |
          if gh pr merge --squash --auto --delete-branch "$PR_URL"; then
            echo "Auto-merge enabled."
          else
            echo "Auto-merge could not be enabled yet; leaving workflow green."
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

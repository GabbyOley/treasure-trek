name: Codex Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  gate:
    name: codex-gate
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate Codex review state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # All reviews on this PR, newest last.
          reviews=$(gh api "repos/$REPO/pulls/$PR/reviews" --paginate)

          # Did Codex review at all yet?
          codex_count=$(echo "$reviews" | jq '[.[] | select(.user.login | test("codex"; "i"))] | length')

          if [ "$codex_count" -eq 0 ]; then
            echo "No Codex review yet — gate stays RED so auto-merge waits."
            echo "::error::Waiting for Codex review."
            exit 1
          fi

          # The most recent Codex review's state.
          latest=$(echo "$reviews" \
            | jq -r '[.[] | select(.user.login | test("codex"; "i"))] | last | .state')
          echo "Latest Codex review state: $latest"

          case "$latest" in
            APPROVED|COMMENTED)
              owner_repo="${REPO#*/}"
              thread_data=$(gh api graphql -f query='
                query($owner:String!, $repo:String!, $pr:Int!) {
                  repository(owner:$owner, name:$repo) {
                    pullRequest(number:$pr) {
                      reviewThreads(first:100) {
                        nodes {
                          isResolved
                          isOutdated
                          path
                          comments(first:20) {
                            nodes {
                              author { login }
                              body
                            }
                          }
                        }
                      }
                    }
                  }
                }' -f owner="$OWNER" -f repo="$owner_repo" -F pr="$PR")

              live_threads=$(echo "$thread_data" \
                | jq '[.data.repository.pullRequest.reviewThreads.nodes[]
                       | select(.isResolved == false and .isOutdated == false)
                       | select(any(.comments.nodes[];
                           (.author.login | test("codex"; "i")) and (.body | test("P0|P1"))))
                      ] | length')

              if [ "$live_threads" -gt 0 ]; then
                echo "Live unresolved review thread paths:"
                echo "$thread_data" \
                  | jq -r '.data.repository.pullRequest.reviewThreads.nodes[]
                           | select(.isResolved == false and .isOutdated == false)
                           | select(any(.comments.nodes[];
                               (.author.login | test("codex"; "i")) and (.body | test("P0|P1"))))
                           | .path'
                echo "::error::Codex has $live_threads live review thread(s). Gate stays RED."
                exit 1
              fi

              echo "Codex review is clean. Gate GREEN."
              ;;
            CHANGES_REQUESTED)
              echo "::error::Codex requested changes. Gate stays RED."
              exit 1
              ;;
            *)
              echo "::error::Unrecognized review state: $latest"
              exit 1
              ;;
          esac
